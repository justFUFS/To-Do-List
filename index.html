<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <header>
        <h1>To-Do List</h1>
    </header>
    <main>
      <section class="Task-creation-form">
        <form>
            <label for="Create-a-task">Create a task:</label>
            <input id="Create-a-task" type="text" placeholder="Enter a task" autocomplete="off">
            <button type="button">ADD</button>
        </form>
      </section>
      <section class="Task-List-Section">
        <h2>Your tasks:</h2>
         <ul id="Task-List">
            <li>Lorem ipsum dolor sit amet.</li>
         </ul>
      </section>
    </main>
    <footer>
       <p>Total Tasks: <b>0</b></p>
    </footer>
</body>
</html>
